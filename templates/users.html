{% extends 'base.html' %}

{% block content %}

<h1>Users</h1>

<br>

<a href="/add-user/">

<button>

Add User

</button>

</a>

<br><br>

<table class="client-table">

<tr>

<th>Username</th>

<th>Actions</th>

</tr>

{% for user in users %}

<tr>

<td>{{ user.username }}</td>

<td>

<a href="/delete-user/{{ user.id }}/"
onclick="return confirm('Delete user?')">

<button>

Delete

</button>

</a>

</td>

</tr>

{% endfor %}

</table>

{% endblock %}
